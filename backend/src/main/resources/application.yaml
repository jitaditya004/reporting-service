server:
  port: ${PORT}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 5
      minimum-idle: 0

  # Flyway handles database schema changes
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Hibernate only validates entities vs database
  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  cors:
    allowed-origin: ${FRONTEND_URL}
